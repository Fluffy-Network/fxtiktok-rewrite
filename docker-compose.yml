services:
  main:
    build:
      context: .
    image: fxtiktok:local
    command: ["bun", "run", "src/index.ts"]
    environment:
      PORT: "3000"
      OFF_LOAD: "${OFF_LOAD:-https://offload.tnktok.com}"
      METRICS_ENABLED: "${METRICS_ENABLED:-false}"
      REDIS_ENABLED: "${REDIS_ENABLED:-false}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
    expose:
      - "3000"
    depends_on:
      offload:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const port = process.env.PORT || 3000; const res = await fetch('http://127.0.0.1:' + port + '/favicon.ico'); process.exit(res.status === 204 ? 0 : 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  offload:
    build:
      context: .
    image: fxtiktok:local
    command: ["bun", "run", "src/offload.ts"]
    environment:
      PORT: "8787"
      REDIS_ENABLED: "${REDIS_ENABLED:-false}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
    expose:
      - "8787"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const port = process.env.PORT || 8787; const res = await fetch('http://127.0.0.1:' + port + '/'); process.exit(res.ok ? 0 : 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
